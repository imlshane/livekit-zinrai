services:

  srs:
    image: ossrs/srs:5
    container_name: srs-origin
    restart: unless-stopped
    command: ./objs/srs -c conf/srs.conf
    environment:
      - CANDIDATE=${SERVER_IP}   # WebRTC ICE candidate IP — must match the server's public IP
    ports:
      - "1935:1935"                  # RTMP ingest — must be public
      - "127.0.0.1:1985:1985"        # SRS API — localhost only
      - "127.0.0.1:8080:8080"        # SRS HTTP — localhost only
      - "8000:8000/udp"              # WebRTC media (SRTP) — must be public
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    mem_limit: 3g
    memswap_limit: 3g
    volumes:
      - ./srs/origin.conf:/usr/local/srs/conf/srs.conf
      - ./srs/logs:/usr/local/srs/logs
      - ./dvr:/dvr
      - ./hls:/usr/local/srs/objs/nginx/hls
    depends_on:
      - auth

  auth:
    build: ./auth
    container_name: srs-auth
    restart: unless-stopped
    networks:
      default:
        ipv4_address: 172.20.0.2   # fixed IP — referenced in srs/origin.conf http_hooks
    environment:
      - DATABASE_URL=sqlite:////data/auth.db
      - SECRET_KEY=${SECRET_KEY:-local-dev-secret-change-in-prod}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-streams}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - DVR_PATH=/dvr
      - HLS_PATH=/hls
      - RECORD_URL=${RECORD_URL:-}
      - RECORD_API_KEY=${RECORD_API_KEY:-}
      - REDIS_URL=${REDIS_URL}
      - REDIS_PREFIX=${REDIS_PREFIX:-zinrai:live:}
      - MANAGEMENT_API_KEY=${MANAGEMENT_API_KEY:-}
      - VIEWER_TOKEN_API_KEY=${VIEWER_TOKEN_API_KEY:-}
      - SRS_PUBLIC_HOST=${SRS_PUBLIC_HOST:-livestream.zinrai.live}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 15s
      timeout: 6s
      retries: 3
      start_period: 10s
    depends_on: []
    volumes:
      - auth-db:/data
      - ./dvr:/dvr
      - ./hls:/hls

  caddy:
    image: caddy:alpine
    container_name: srs-caddy
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3 (QUIC)
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./nginx/html:/srv/html:ro              # reuse existing static files
      - caddy-data:/data                       # persists TLS certs across restarts
      - caddy-config:/config
    depends_on:
      - srs
      - auth

volumes:
  auth-db:
  caddy-data:     # TLS certificates — persists across container restarts
  caddy-config:

networks:
  default:
    ipam:
      config:
        - subnet: 172.20.0.0/16
