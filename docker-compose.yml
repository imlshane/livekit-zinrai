services:

  srs:
    image: ossrs/srs:5
    container_name: srs-origin
    restart: unless-stopped
    command: ./objs/srs -c conf/srs.conf
    ports:
      - "1935:1935"                  # RTMP ingest — must be public
      - "127.0.0.1:1985:1985"        # SRS API — localhost only
      - "127.0.0.1:8080:8080"        # SRS HTTP — localhost only
      - "8000:8000/udp"              # WebRTC media (SRTP) — must be public
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    mem_limit: 3g
    memswap_limit: 3g
    volumes:
      - ./srs/origin.conf:/usr/local/srs/conf/srs.conf
      - ./dvr:/dvr
      - ./hls:/usr/local/srs/objs/nginx/hls
    depends_on:
      - auth

  auth:
    build: ./auth
    container_name: srs-auth
    restart: unless-stopped
    networks:
      default:
        ipv4_address: 172.20.0.2   # fixed IP — referenced in srs/origin.conf http_hooks
    environment:
      - DATABASE_URL=sqlite:////data/auth.db
      - SECRET_KEY=${SECRET_KEY:-local-dev-secret-change-in-prod}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-streams}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - DVR_PATH=/dvr
      - HLS_PATH=/hls
      - RECORD_URL=${RECORD_URL:-}
      - RECORD_API_KEY=${RECORD_API_KEY:-}
      - REDIS_URL=${REDIS_URL}
      - REDIS_PREFIX=${REDIS_PREFIX:-zinrai:live:}
      - MANAGEMENT_API_KEY=${MANAGEMENT_API_KEY:-}
      - VIEWER_TOKEN_API_KEY=${VIEWER_TOKEN_API_KEY:-}
      - SRS_PUBLIC_HOST=${SRS_PUBLIC_HOST:-livestream.zinrai.live}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on: []
    volumes:
      - auth-db:/data
      - ./dvr:/dvr
      - ./hls:/hls

  nginx:
    image: nginx:alpine
    container_name: srs-nginx
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - srs
      - auth

volumes:
  auth-db:

networks:
  default:
    ipam:
      config:
        - subnet: 172.20.0.0/16
