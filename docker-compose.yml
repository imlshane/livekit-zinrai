services:

  redis:
    image: redis:7-alpine
    container_name: srs-redis
    restart: unless-stopped
    networks:
      default:
        ipv4_address: 172.20.0.3
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  srs:
    image: ossrs/srs:5
    container_name: srs-origin
    restart: unless-stopped
    command: ./objs/srs -c conf/srs.conf
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8080:8080"
      - "8000:8000/udp"   # WebRTC media (SRTP)
    volumes:
      - ./srs/origin.conf:/usr/local/srs/conf/srs.conf
      - ./dvr:/dvr
    depends_on:
      - auth

  auth:
    build: ./auth
    container_name: srs-auth
    restart: unless-stopped
    networks:
      default:
        ipv4_address: 172.20.0.2   # fixed IP — referenced in srs/origin.conf http_hooks
    environment:
      - DATABASE_URL=sqlite:////data/auth.db
      - SECRET_KEY=${SECRET_KEY:-local-dev-secret-change-in-prod}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-streams}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - DVR_PATH=/dvr
      - RECORD_URL=${RECORD_URL:-}
      - RECORD_API_KEY=${RECORD_API_KEY:-}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - MANAGEMENT_API_KEY=${MANAGEMENT_API_KEY:-}
    depends_on:
      - redis
    volumes:
      - auth-db:/data
      - ./dvr:/dvr

  nginx:
    image: nginx:alpine
    container_name: srs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - srs
      - auth

volumes:
  auth-db:
  redis-data:

networks:
  default:
    ipam:
      config:
        - subnet: 172.20.0.0/16
