services:

  srs:
    image: ossrs/srs:5
    container_name: srs-origin
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8080:8080"
    volumes:
      - ./srs/origin.conf:/usr/local/srs/conf/srs.conf
      - srs-dvr:/dvr
    depends_on:
      - auth

  auth:
    build: ./auth
    container_name: srs-auth
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////data/auth.db
      - SECRET_KEY=${SECRET_KEY:-local-dev-secret-change-in-prod}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-streams}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - DVR_PATH=/dvr
    volumes:
      - auth-db:/data
      - srs-dvr:/dvr

  nginx:
    image: nginx:alpine
    container_name: srs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - srs
      - auth

volumes:
  srs-dvr:
  auth-db:
