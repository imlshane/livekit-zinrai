<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Stream</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e0e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
  .player-wrap { position: relative; width: 100%; max-width: 1280px; }
  video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
  #status { margin-top: 10px; font-size: 13px; color: #888; text-align: center; }
  #error  { margin-top: 8px; font-size: 12px; color: #e55; text-align: center; display: none; }
  #unmute-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6); cursor: pointer; gap: 12px;
  }
  #unmute-overlay svg { width: 56px; height: 56px; fill: #fff; opacity: 0.9; }
  #unmute-overlay span { font-size: 15px; color: #fff; opacity: 0.85; }
  #unmute-overlay.hidden { display: none; }
</style>
</head>
<body>
<div class="player-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="unmute-overlay" class="hidden">
    <!-- Speaker icon -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    </svg>
    <span>Click to enable audio</span>
  </div>
</div>
<div id="status">Connecting...</div>
<div id="error"></div>

<script>
(function () {
  var params    = new URLSearchParams(window.location.search);
  var streamKey = params.get('stream');
  var token     = params.get('token');
  var statusEl  = document.getElementById('status');
  var errorEl   = document.getElementById('error');
  var video     = document.getElementById('video');

  function setStatus(msg) { statusEl.textContent = msg; }
  function setError(msg)  { errorEl.textContent = msg; errorEl.style.display = msg ? 'block' : 'none'; }

  if (!streamKey) {
    setStatus('No stream specified.');
    setError('Add ?stream=YOUR_STREAM_KEY&token=YOUR_TOKEN to the URL.');
    return;
  }

  if (!window.RTCPeerConnection) {
    setStatus('WebRTC not supported in this browser.');
    return;
  }

  var overlay     = document.getElementById('unmute-overlay');
  var pc          = null;
  var retryCount  = 0;
  var retryTimer  = null;
  var MAX_RETRY   = 30;
  var connected   = false;

  // Click overlay → unmute and hide it
  overlay.addEventListener('click', function () {
    video.muted = false;
    overlay.classList.add('hidden');
  });

  // SRS5 uses proprietary JSON API at /rtc/v1/play/ (not WHEP which is SRS6+)
  function rtcPlayUrl() {
    var url = '/rtc/v1/play/';
    if (token) url += '?token=' + token;
    return url;
  }

  function streamUrl() {
    return 'webrtc://' + window.location.host + '/live/' + streamKey;
  }

  function scheduleRetry(delaySec) {
    if (retryTimer) return;
    if (retryCount >= MAX_RETRY) {
      setStatus('Stream unavailable. Refresh the page to try again.');
      return;
    }
    var delay = delaySec || Math.min(2000 * Math.pow(1.5, retryCount), 20000);
    retryCount++;
    setStatus('Waiting for stream... (' + retryCount + '/' + MAX_RETRY + ')');
    retryTimer = setTimeout(function () { retryTimer = null; connect(); }, delay);
  }

  function cleanup() {
    if (pc) {
      pc.oniceconnectionstatechange = null;
      pc.ontrack = null;
      try { pc.close(); } catch (_) {}
      pc = null;
    }
    video.srcObject = null;
    connected = false;
  }

  async function connect() {
    cleanup();

    pc = new RTCPeerConnection({
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
      bundlePolicy: 'max-bundle',
    });

    pc.addTransceiver('video', { direction: 'recvonly' });
    pc.addTransceiver('audio', { direction: 'recvonly' });

    pc.ontrack = function (e) {
      if (e.streams && e.streams[0]) {
        video.srcObject = e.streams[0];
        // Start muted (browser autoplay policy) then show overlay for unmute
        video.muted = true;
        video.play().then(function () {
          overlay.classList.remove('hidden');
        }).catch(function () {
          overlay.classList.remove('hidden');
        });
      }
    };

    pc.oniceconnectionstatechange = function () {
      var state = pc ? pc.iceConnectionState : 'closed';
      if (state === 'connected' || state === 'completed') {
        connected = true;
        retryCount = 0;
        setStatus('LIVE — WebRTC');
        setError('');
      } else if (state === 'disconnected') {
        setStatus('Connection dropped — reconnecting...');
        scheduleRetry(3000);
      } else if (state === 'failed' || state === 'closed') {
        setStatus('Connection failed — retrying...');
        scheduleRetry();
      }
    };

    var offer;
    try {
      offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
    } catch (e) {
      setStatus('Failed to create offer.');
      setError(e.message);
      scheduleRetry();
      return;
    }

    // POST SDP offer to SRS /rtc/v1/play/ (SRS5 proprietary JSON API)
    var result;
    try {
      var resp = await fetch(rtcPlayUrl(), {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ sdp: offer.sdp, streamurl: streamUrl() }),
      });
      result = await resp.json();
    } catch (e) {
      // Network error or stream not started yet
      scheduleRetry();
      return;
    }

    if (result.code === 401 || result.code === 403) {
      setStatus('Access denied.');
      setError('Token invalid or expired. Get a new link from the host.');
      return;  // do NOT retry on auth failure
    }

    if (result.code !== 0) {
      // Non-zero code = stream not ready yet (404) or other transient error
      scheduleRetry();
      return;
    }

    try {
      await pc.setRemoteDescription({ type: 'answer', sdp: result.sdp });
    } catch (e) {
      setStatus('SDP negotiation failed.');
      setError(e.message);
      scheduleRetry();
    }
  }

  // Reconnect when tab becomes visible again
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden && !connected && !retryTimer) {
      retryCount = 0;
      connect();
    }
  });

  connect();
})();
</script>
</body>
</html>
