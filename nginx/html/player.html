<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Stream</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e0e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; }
  .player-wrap { position: relative; width: 100%; max-width: 1280px; }
  video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
  #status { margin-top: 10px; font-size: 13px; color: #888; text-align: center; }
  #error  { margin-top: 8px; font-size: 12px; color: #e55; text-align: center; display: none; }
</style>
</head>
<body>
<div class="player-wrap">
  <video id="video" autoplay playsinline></video>
</div>
<div id="status">Connecting...</div>
<div id="error"></div>

<script>
(function () {
  var params    = new URLSearchParams(window.location.search);
  var streamKey = params.get('stream');
  var token     = params.get('token');
  var statusEl  = document.getElementById('status');
  var errorEl   = document.getElementById('error');
  var video     = document.getElementById('video');

  function setStatus(msg) { statusEl.textContent = msg; }
  function setError(msg)  { errorEl.textContent = msg; errorEl.style.display = msg ? 'block' : 'none'; }

  if (!streamKey) {
    setStatus('No stream specified.');
    setError('Add ?stream=YOUR_STREAM_KEY&token=YOUR_TOKEN to the URL.');
    return;
  }

  if (!window.RTCPeerConnection) {
    setStatus('WebRTC not supported in this browser.');
    return;
  }

  var pc          = null;
  var retryCount  = 0;
  var retryTimer  = null;
  var MAX_RETRY   = 30;
  var connected   = false;

  function whepUrl() {
    var base = window.location.protocol + '//' + window.location.host;
    var url  = base + '/rtc/v1/whep/?app=live&stream=' + streamKey;
    if (token) url += '&token=' + token;
    return url;
  }

  function scheduleRetry(delaySec) {
    if (retryTimer) return;
    if (retryCount >= MAX_RETRY) {
      setStatus('Stream unavailable. Refresh the page to try again.');
      return;
    }
    var delay = delaySec || Math.min(2000 * Math.pow(1.5, retryCount), 20000);
    retryCount++;
    setStatus('Waiting for stream... (' + retryCount + '/' + MAX_RETRY + ')');
    retryTimer = setTimeout(function () { retryTimer = null; connect(); }, delay);
  }

  function cleanup() {
    if (pc) {
      pc.oniceconnectionstatechange = null;
      pc.ontrack = null;
      try { pc.close(); } catch (_) {}
      pc = null;
    }
    video.srcObject = null;
    connected = false;
  }

  async function connect() {
    cleanup();

    pc = new RTCPeerConnection({
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
      bundlePolicy: 'max-bundle',
    });

    pc.addTransceiver('video', { direction: 'recvonly' });
    pc.addTransceiver('audio', { direction: 'recvonly' });

    pc.ontrack = function (e) {
      if (e.streams && e.streams[0]) {
        video.srcObject = e.streams[0];
      }
    };

    pc.oniceconnectionstatechange = function () {
      var state = pc ? pc.iceConnectionState : 'closed';
      if (state === 'connected' || state === 'completed') {
        connected = true;
        retryCount = 0;
        setStatus('LIVE — WebRTC');
        setError('');
      } else if (state === 'disconnected') {
        setStatus('Connection dropped — reconnecting...');
        scheduleRetry(3000);
      } else if (state === 'failed' || state === 'closed') {
        setStatus('Connection failed — retrying...');
        scheduleRetry();
      }
    };

    var offer;
    try {
      offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
    } catch (e) {
      setStatus('Failed to create offer.');
      setError(e.message);
      scheduleRetry();
      return;
    }

    // POST SDP offer to SRS WHEP endpoint
    var resp;
    try {
      resp = await fetch(whepUrl(), {
        method:  'POST',
        headers: { 'Content-Type': 'application/sdp' },
        body:    offer.sdp,
      });
    } catch (e) {
      // Network error — stream likely not started yet
      scheduleRetry();
      return;
    }

    if (resp.status === 403) {
      setStatus('Access denied.');
      setError('Token invalid or expired. Refresh the page to get a new link.');
      return;  // do NOT retry — token issue, not a stream issue
    }

    if (!resp.ok) {
      // 404 = stream not started yet, keep retrying
      scheduleRetry();
      return;
    }

    var answerSdp = await resp.text();
    try {
      await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
    } catch (e) {
      setStatus('SDP negotiation failed.');
      setError(e.message);
      scheduleRetry();
    }
  }

  // Reconnect when tab becomes visible again
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden && !connected && !retryTimer) {
      retryCount = 0;
      connect();
    }
  });

  connect();
})();
</script>
</body>
</html>
