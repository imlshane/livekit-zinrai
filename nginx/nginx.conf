worker_processes     auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use                epoll;
    multi_accept       on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 10000;

    # Docker internal DNS — resolves service names at request time, not startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Allowed origins for stream playback ──────────────────────────────────
    # Add new client domains here. Empty origin (non-browser) is blocked — token
    # validation in on_play is still required regardless of this check.
    map $http_origin $origin_allowed {
        default                                 0;
        ~^https://([\w-]+\.)?zinrai\.live$      1;
        ~^https://([\w-]+\.)?zinraideas\.com$   1;
        ~^https://([\w-]+\.)?gamesnag\.com$     1;
        "http://localhost:8000"                  1;
        "http://localhost:3000"                  1;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen      80;
        server_name livestream.zinrai.live;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────
    server {
        listen      443 ssl;
        http2       on;
        server_name livestream.zinrai.live;

        ssl_certificate     /etc/letsencrypt/live/livestream.zinrai.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/livestream.zinrai.live/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Viewer player page — allow embedding from any zinrai.live subdomain
        location /player {
            alias        /usr/share/nginx/html/player.html;
            default_type text/html;
            add_header   Cache-Control no-cache;
            add_header   X-Frame-Options "ALLOW-FROM https://devstreamapp.zinrai.live" always;
            valid_referers none blocked ~\.zinrai\.live ~\.zinraideas\.com;
            if ($invalid_referer) { return 403; }
        }

        # WebRTC signaling — SRS5 JSON API on port 1985
        # Player POSTs {sdp, streamurl} here, gets back {code:0, sdp:answer}
        location /rtc/v1/play/ {
            if ($origin_allowed = 0) { return 403 "Origin not permitted"; }
            set $srs_api http://srs:1985;
            rewrite ^/rtc/(.*)$ /rtc/$1 break;
            proxy_pass            $srs_api;
            proxy_set_header      Host $host;
            proxy_http_version    1.1;
            add_header            Access-Control-Allow-Origin  $http_origin always;
            add_header            Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header            Access-Control-Allow-Headers "Content-Type" always;
            add_header            Vary                         Origin always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # HLS fallback — kept for debugging/Safari issues only
        location ~ ^/hls/ {
            if ($origin_allowed = 0) { return 403 "Origin not permitted"; }
            set $srs_backend http://srs:8080;
            proxy_pass       $srs_backend;
            proxy_set_header Host $host;
            add_header       Access-Control-Allow-Origin $http_origin always;
            add_header       Vary                        Origin always;
            add_header       Cache-Control               no-cache;
        }

        # SRS stats API — /api/srs/v1/... → http://srs:1985/api/v1/...
        location /api/srs/ {
            set $srs_api http://srs:1985;
            rewrite ^/api/srs/(.*)$ /api/$1 break;
            proxy_pass       $srs_api;
            proxy_set_header Host $host;
        }

        # Auth service API — /api/... → http://auth:8000/...
        location /api/ {
            set $auth_backend http://auth:8000;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass       $auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
