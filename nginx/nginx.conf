worker_processes     auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use                epoll;
    multi_accept       on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 10000;

    # Docker internal DNS — resolves service names at request time, not startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen      80;
        server_name livestream.zinrai.live;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────
    server {
        listen      443 ssl;
        http2       on;
        server_name livestream.zinrai.live;

        ssl_certificate     /etc/letsencrypt/live/livestream.zinrai.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/livestream.zinrai.live/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Viewer player page — domain-locked
        location /player {
            alias        /usr/share/nginx/html/player.html;
            default_type text/html;
            add_header   Cache-Control no-cache;
            valid_referers none blocked livestream.zinrai.live;
            if ($invalid_referer) { return 403; }
        }

        # HTTP-FLV stream proxy — variable forces runtime DNS resolution
        location ~ ^/live/.*\.flv$ {
            set $srs_backend http://srs:8080;
            proxy_pass         $srs_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_buffering    off;
            proxy_read_timeout 3600s;
            add_header         Access-Control-Allow-Origin *;
            add_header         Cache-Control no-cache;
        }

        # HLS stream proxy — Safari / iOS
        location ~ ^/hls/ {
            set $srs_backend http://srs:8080;
            proxy_pass       $srs_backend;
            proxy_set_header Host $host;
            add_header       Access-Control-Allow-Origin *;
            add_header       Cache-Control no-cache;
        }

        # SRS stats API — monitoring
        location /api/srs/ {
            set $srs_api http://srs:1985;
            proxy_pass       $srs_api/api/;
            proxy_set_header Host $host;
        }

        # Auth service API
        location /api/ {
            set $auth_backend http://auth:8000;
            proxy_pass       $auth_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
