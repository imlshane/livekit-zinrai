worker_processes auto;
events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name livestream.zinrai.live;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name livestream.zinrai.live;

        ssl_certificate     /etc/letsencrypt/live/livestream.zinrai.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/livestream.zinrai.live/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        root /usr/share/nginx/html;

        location /player {
            alias /usr/share/nginx/html/player.html;
            default_type text/html;
            add_header Cache-Control no-cache;
        }

        location / {
            proxy_pass         http://127.0.0.1:7880;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection upgrade;
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
