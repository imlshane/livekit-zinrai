listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx;
    crossdomain     on;
}

stats {
    network         0;
}

vhost __defaultVhost__ {

    # HTTP-FLV delivery — low latency (~1s), no SDK needed
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
        hstrs       on;
    }

    # HLS fallback — Safari / iOS compatibility
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      6;
        hls_path        ./objs/nginx/hls;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
    }

    # DVR — record full session to disk as .flv
    # Auth service on_dvr callback converts to .mp4 and uploads
    dvr {
        enabled         on;
        dvr_path        /dvr/[app]/[stream]-[2006]-[01]-[02]T[15]-[04]-[05].flv;
        dvr_plan        session;
    }

    # Callbacks — auth service handles all validation
    http_hooks {
        enabled         on;
        on_publish      http://auth:8000/on_publish;
        on_unpublish    http://auth:8000/on_unpublish;
        on_play         http://auth:8000/on_play;
        on_stop         http://auth:8000/on_stop;
        on_dvr          http://auth:8000/on_dvr;
    }
}
