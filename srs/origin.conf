listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       warn;

# WebRTC server — receives RTMP from OBS and serves it to browsers via WHEP
rtc_server {
    enabled     on;
    listen      8000;
    candidate   209.38.63.157;   # server public IP — sent to browsers as ICE candidate
}

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx;
    crossdomain     on;
}

stats {
    network         0;
}

vhost __defaultVhost__ {

    # WebRTC per-vhost — bridge RTMP→WebRTC for WHEP playback
    rtc {
        enabled         on;
        rtmp_to_rtc     on;
        # Keep audio packets in order — reduces dropout from out-of-order RTP
        nack            on;
        # Smooths out audio RTP send timing from the RTMP→WebRTC bridge
        twcc            on;
    }

    # HTTP-FLV delivery — low latency (~1s), no SDK needed
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
        hstrs       on;
    }

    # HLS fallback — Safari / iOS compatibility
    # hls_cleanup off keeps all segments on disk (mounted to host ./hls)
    # so they survive as a fallback archive and can be uploaded to R2
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      6;
        hls_cleanup     off;
        hls_path        ./objs/nginx/hls;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
    }

    # DVR — record full session to disk as .flv
    # Auth service on_dvr callback converts to .mp4 and uploads
    dvr {
        enabled         on;
        dvr_path        /dvr/[app]/[stream]-[2006]-[01]-[02]T[15]-[04]-[05].flv;
        dvr_plan        session;
    }

    # Callbacks — auth service handles all validation
    # Using container IP (172.20.0.2) to bypass Docker DNS resolution in SRS
    http_hooks {
        enabled         on;
        on_publish      http://172.20.0.2:8000/on_publish;
        on_unpublish    http://172.20.0.2:8000/on_unpublish;
        on_play         http://172.20.0.2:8000/on_play;
        on_stop         http://172.20.0.2:8000/on_stop;
        on_dvr          http://172.20.0.2:8000/on_dvr;
    }
}
